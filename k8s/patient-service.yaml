# ============================================================
#  k8s/patient-service.yaml
#  Namespace: clinic
#
#  Secret requerido:
#    kubectl create secret generic patient-postgres-secret \
#      --namespace clinic \
#      --from-literal=POSTGRES_USER=patient_svc_user \
#      --from-literal=POSTGRES_PASSWORD=<PASSWORD> \
#      --from-literal=POSTGRES_DB=patient_db
# ============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: patient-service-config
  namespace: clinic
data:
  NODE_ENV: "production"
  PORT: "3003"
  DB_HOST: "patient-postgres"
  DB_PORT: "5432"
  DB_NAME: "patient_db"
  DB_SSL: "false"
  # URL interna del user-service dentro del clúster
  # El Service de K8s resuelve el nombre 'user-service' al Pod correcto
  USER_SERVICE_URL: "http://user-service:3002"
  ALLOWED_ORIGINS: "http://192.168.1.28:8000"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: patient-postgres-pvc
  namespace: clinic
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-postgres
  namespace: clinic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-postgres
  template:
    metadata:
      labels:
        app: patient-postgres
    spec:
      containers:
        - name: patient-postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: patient-postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: patient-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: patient-postgres-secret
                  key: POSTGRES_DB
          volumeMounts:
            - name: patient-postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: [pg_isready, -U, patient_svc_user, -d, patient_db]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: patient-postgres-data
          persistentVolumeClaim:
            claimName: patient-postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: patient-postgres
  namespace: clinic
spec:
  selector:
    app: patient-postgres
  ports:
    - port: 5432
      targetPort: 5432

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: clinic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      containers:
        - name: patient-service
          image: ghcr.io/miguelangelramos/clinic-patient-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3003
          envFrom:
            - configMapRef:
                name: patient-service-config
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: patient-postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: patient-postgres-secret
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 80m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 192Mi
          readinessProbe:
            httpGet:
              path: /patients/health
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /patients/health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
  namespace: clinic
spec:
  selector:
    app: patient-service
  ports:
    - port: 3003
      targetPort: 3003

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: patient-service-hpa
  namespace: clinic
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: patient-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
